# 一站式工作台 Docker Compose 配置

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workbench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-unified_workbench}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workbench}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workbench

  # Redis 缓存/队列
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workbench

  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${NAS_FILES_PATH:-./data/files}:/data/files
      - ${NAS_BACKUPS_PATH:-./data/backups}:/data/backups
    networks:
      - workbench

  # Celery 异步任务
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${NAS_FILES_PATH:-./data/files}:/data/files
    networks:
      - workbench

  # Celery Beat 定时任务调度
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /tmp
    environment:
      - PYTHONPATH=/app
    command: celery -A app.tasks beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - workbench

  # React 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - workbench

  # MediaMTX 流媒体服务器
  mediamtx:
    image: bluenviron/mediamtx:1
    restart: unless-stopped
    ports:
      - "8889:8889"
      - "8189:8189/udp"
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8890:8890/udp"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    environment:
      MTX_WEBRTCADDITIONALHOSTS: "${HOST_IP:-host.docker.internal}"
    healthcheck:
      test: ["CMD", "curl", "-f", "-X", "OPTIONS", "http://localhost:8889/test/whip"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - workbench

  # Nginx 反向代理
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - workbench

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  workbench:
    driver: bridge
