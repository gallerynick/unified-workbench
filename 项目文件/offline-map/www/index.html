<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国离线街道地图</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #map { width: 100%; height: 100vh; }
    .maplibregl-ctrl-attrib { font-size: 11px; }
    .info-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.95);
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 10;
      max-width: 320px;
    }
    .info-panel h3 { margin: 0 0 8px 0; font-size: 14px; color: #333; }
    .info-panel p { margin: 4px 0; font-size: 12px; color: #666; }
    .locate-btn {
      position: absolute;
      bottom: 30px;
      right: 10px;
      background: #1677ff;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .locate-btn:hover { background: #0958d9; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="info-panel">
    <h3>📍 中国离线街道地图</h3>
    <p>数据来源：© OpenStreetMap contributors</p>
    <p>许可：ODbL</p>
    <p id="coords">经度：—，纬度：—</p>
  </div>
  <button type="button" class="locate-btn" onclick="locateMe()">📍 获取当前位置</button>

  <script>
    // 瓦片服务端地址（容器内访问）
    const TILESERVER_URL = 'http://localhost:8080';

    const map = new maplibregl.Map({
      container: 'map',
      style: TILESERVER_URL + '/styles/basic-preview/style.json',
      center: [116.397, 39.908],  // 北京
      zoom: 10,
      minZoom: 0,
      maxZoom: 14,
      attributionControl: true
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.ScaleControl({ maxWidth: 200 }), 'bottom-left');

    // 鼠标移动显示坐标
    map.on('mousemove', function(e) {
      const lng = e.lngLat.lng.toFixed(4);
      const lat = e.lngLat.lat.toFixed(4);
      document.getElementById('coords').textContent = '经度：' + lng + '，纬度：' + lat;
    });

    // 获取当前位置
    function locateMe() {
      if (!navigator.geolocation) {
        alert('浏览器不支持地理定位');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          const lng = pos.coords.longitude;
          const lat = pos.coords.latitude;
          map.flyTo({ center: [lng, lat], zoom: 14 });

          // 添加标记
          new maplibregl.Marker({ color: '#1677ff' })
            .setLngLat([lng, lat])
            .setPopup(new maplibregl.Popup().setHTML('<b>我的位置</b><br>经度：' + lng.toFixed(4) + '<br>纬度：' + lat.toFixed(4)))
            .addTo(map)
            .togglePopup();
        },
        function(err) {
          alert('获取位置失败：' + err.message);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    }
  </script>
</body>
</html>
