# 一站式工作台 Nginx 反向代理配置

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# HTTPS（自签名证书，局域网使用）
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    include /etc/nginx/includes/shared.conf;
}

# HTTP
server {
    listen 80;
    server_name _;

    include /etc/nginx/includes/shared.conf;
}
